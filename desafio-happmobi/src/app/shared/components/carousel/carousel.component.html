          <div id="carouselCars" class="carousel slide">
            <div class="carousel-inner">
            @for (item of carList(); track $index; let i = $index) {
              <div class="carousel-item" [class.active]="i === 0">
                  <app-card-cars
                  [img]="item.img"
                  [name]="item.name"
                  [year]="item.year"
                  [type]="item.type"
                  [engine]="item.engine"
                  [size]="item.size"
                  ></app-card-cars>
                </div>
            }
            </div>
            <button
              class="carousel-control-prev"
              type="button"
              data-bs-target="#carouselCars"
              data-bs-slide="prev"
            >
              <span class="carousel-control-prev-icon"></span>
            </button>
            <button
              class="carousel-control-next"
              type="button"
              data-bs-target="#carouselCars"
              data-bs-slide="next"
            >
              <span class="carousel-control-next-icon"></span>
            </button>
          </div>
