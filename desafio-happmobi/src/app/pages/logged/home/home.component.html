@if (!showFilter) {
  <section>
    <div class="container-fluid layout-page">
      <header class="no-container">
        <div>
          <img
            src="assets/images/header/home/carros-estacionados.png"
            alt="carros estacionados"
            width="100%"
            class="opacity"
            style="height: 30vh"
          />
        </div>
        <div class="d-flex justify-content-center align-item-center">
          <img
            class="user-img"
            src="assets/images/header/home/imagem-usuario.png"
            alt="usuário autenticado"
          />
        </div>
      </header>
      <main>
        <!-- Filtros -->
        <div
          class="d-flex justify-content-around align-item-center mb-3 overlaid-img"
        >
          <div class="search-input">
            <i class="fa fa-search"></i>
            <input
              class="input-text card card-search"
              type="search"
              placeholder="Buscar carro"
            />
          </div>
          <button class="card card-width" (click)="showFilterComponent()">
            <i class="fas fa-filter"></i> Filtrar
          </button>
        </div>
        <div class="mb-5 mt-5">
          <div class="mb-4">
            <h2 class="text-primary-g"><b>Últimas Reservas</b></h2>
          </div>
          <app-carousel [carList]="carList"></app-carousel>
        </div>
        <div class="d-flex justify-content-center">
          <button class="btn btn-primary btn-round btn-spacing w-100">
            <i class="fas fa-qrcode"></i> Acessar por QR code
          </button>
        </div>
      </main>
      <footer>
        <div class="d-flex justify-content-around mt-5 footer-g no-container">
          <div class="btn-footer">
            <div class="d-flex justify-content-center mb-2">
              <i class="fas fa-home icons"></i>
            </div>
            <h5 class="text-primary-g">INÍCIO</h5>
          </div>
          <div class="btn-footer">
            <div class="d-flex justify-content-center mb-2">
              <i class="fas fa-book icons"></i>
            </div>
            <h5 class="text-primary-g">AGENDAMENTOS</h5>
          </div>
          <div class="btn-footer">
            <div class="d-flex justify-content-center mb-2">
              <i class="fas fa-headset icons"></i>
            </div>
            <h5 class="text-primary-g">CENTRAL</h5>
          </div>
          <div class="btn-footer">
            <div class="d-flex justify-content-center mb-2">
              <i class="fas fa-user icons"></i>
            </div>
            <h5 class="text-primary-g">PERFIL</h5>
          </div>
        </div>
      </footer>
    </div>
  </section>
} @else {
  <app-filter
    [listCars]="carList()"
    (filterCancel)="showFilter = false"
    (listSelectedFilter)="showFilteredList($event)"
  ></app-filter>
}
